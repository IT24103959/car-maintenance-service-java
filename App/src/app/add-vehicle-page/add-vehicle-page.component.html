<div class="container">
  <h2>Add a New Vehicle</h2>

  <form #vehicleForm="ngForm">
    <div class="form-group">
      <label for="title">Vehicle Model</label>
      <input
        type="text"
        id="title"
        name="title"
        [(ngModel)]="vehicle.vehicleModel"
        placeholder="Enter vehicle title"
        required
        #vehicleModel="ngModel"
      />
    </div>

    <div class="form-group">
      <label for="category">Year</label>
      <input
        type="text"
        id="category"
        name="category"
        [(ngModel)]="vehicle.vehicleYear"
        placeholder="Enter category"
        required
        #vehicleYear="ngModel"
      />
    </div>
    
    <div class="form-group">
      <label for="author">Registration Number</label>
      <input
        type="text"
        id="author"
        name="manufacturer"
        [(ngModel)]="vehicle.vehicleRegistrationNumber"
        placeholder="Enter manufacturer name"
        required
        #vehicleRegistrationNumber="ngModel"
      />
    </div>

    <button type="submit" class="button2" (click)="onSubmit()">Add Vehicle</button>
  </form>
</div>
